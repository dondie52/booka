<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BookHeaven Botswana</title>
    <script>
      // GitHub Pages SPA redirect
      // When GitHub Pages can't find a path (e.g. /book/book-2),
      // it serves this 404.html. This script redirects to the homepage
      // with the original path encoded in the query string.
      // A matching script in index.html decodes it back.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
